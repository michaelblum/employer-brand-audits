<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EBA Workbench</title>
  <link rel="stylesheet" href="/assets/artifact-workbench.css">
</head>
<body>
  <div class="toolbar primary">
    <button class="overview-button" id="overview" type="button"><span>☰</span><span>Overview</span></button>
    <div class="toolbar-middle" id="toolbar-middle">
      <div class="artifact-title" id="artifact-title"></div>
      <div class="sibling-nav" id="sibling-nav" aria-label="Artifact navigation">
        <button class="icon-button" id="prev" type="button" title="Previous artifact">‹</button>
        <button class="icon-button" id="next" type="button" title="Next artifact">›</button>
      </div>
    </div>
    <div class="popover" id="overview-popover" hidden></div>
    <div class="group toolbar-right">
      <button class="icon-button" id="menu-button" type="button" title="Artifact menu">⋮</button>
      <div class="menu" id="artifact-menu" hidden>
        <button type="button" id="copy-artifact">Copy</button>
        <button type="button" id="copy-path">Copy Path</button>
      </div>
      <button class="icon-button" id="toggle-sidebar" type="button" title="Toggle sidebar">▣</button>
    </div>
  </div>
  <main class="shell" id="shell">
    <div class="stage-column">
      <div class="toolbar secondary">
        <div class="artifact-toolbar" id="artifact-toolbar"></div>
      </div>
      <section class="stage" id="stage">
        <div class="image-wrap" id="image-wrap">
          <img id="artifact-image" alt="" draggable="false">
          <div class="selection" id="selection" hidden></div>
          <div class="hover-marker" id="hover-marker" hidden>💡</div>
        </div>
        <div class="artifact-document markdown-wrap" id="markdown-wrap" hidden>
          <div class="artifact-document-scroll markdown-preview" id="markdown-preview">
            <div class="artifact-document-body artifact-projection-markdown markdown-preview-body" id="markdown-preview-body"></div>
          </div>
          <textarea class="markdown-source" id="markdown-source" spellcheck="true" hidden></textarea>
          <div class="markdown-marker" id="markdown-marker" hidden></div>
        </div>
        <div class="target-link-layer" id="target-pairing-layer" data-target-link-layer hidden>
          <svg class="target-link-connectors" id="target-pairing-connectors" data-target-link-connector data-workflow-pairing-connector aria-hidden="true">
            <defs>
              <linearGradient id="target-link-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop data-target-link-gradient-stop="primary" offset="0%" stop-color="#38bdf8" stop-opacity="0.15"></stop>
                <stop data-target-link-gradient-stop="secondary" offset="45%" stop-color="#93c5fd" stop-opacity="1"></stop>
                <stop data-target-link-gradient-stop="accent" offset="72%" stop-color="#22d3ee" stop-opacity="0.85"></stop>
                <stop data-target-link-gradient-stop="primary" offset="100%" stop-color="#38bdf8" stop-opacity="0.15"></stop>
              </linearGradient>
            </defs>
            <path class="target-link-connector-path" id="target-pairing-connector-path" data-target-link-connector-path data-workflow-pairing-connector-path></path>
          </svg>
          <div class="target-link-highlight" id="target-pairing-highlight" data-target-link-highlight data-workflow-pairing-highlight hidden></div>
        </div>
        <div class="bounded-input-layer" id="bounded-input-layer" hidden></div>
        <div class="comment-popover" id="comment-popover" hidden>
          <div class="dictation-field">
            <textarea id="comment-text" placeholder="Leave a comment"></textarea>
            <button class="dictation-control" id="comment-dictation" type="button" aria-label="Start dictation" title="Start dictation">
              <span class="dictation-icon" aria-hidden="true">
                <svg>
                  <use href="/assets/artifact-workbench-icons.svg#icon-dictation"></use>
                </svg>
              </span>
              <span class="dictation-wave" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
            </button>
          </div>
          <div class="comment-actions">
            <div class="group">
              <button class="action-button" id="secondary-comment-action" type="button">Cancel</button>
              <button class="action-button primary" id="primary-comment-action" type="button">Add Comment</button>
            </div>
          </div>
        </div>
      </section>
    </div>
    <aside class="sidebar" id="sidebar"></aside>
  </main>
  <div class="toast" id="toast"></div>
  <script src="/assets/artifact-primitives/vendor/mermaid.min.js" defer></script>
  <script src="/assets/artifact-primitives/mermaid_renderer.js" defer></script>
  <script src="/assets/artifact-primitives/markdown_renderer.js" defer></script>
  <script src="/assets/artifact-primitives/markdown_interactions.js" defer></script>
  <script src="/assets/artifact-primitives/zoom_surface.js" defer></script>
  <script src="/assets/artifact-primitives/image_viewer.js" defer></script>
  <script src="/assets/artifact-primitives/document_renderer.js" defer></script>
  <script src="/assets/artifact-primitives/html_renderer.js" defer></script>
  <script src="/assets/artifacts/core/artifact_common.js" defer></script>
  <script src="/assets/artifacts/core/bounded_input_controls.js" defer></script>
  <script src="/assets/artifacts/core/workflow_pairing.js" defer></script>
  <script src="/assets/artifacts/core/zoom_controls.js" defer></script>
  <script src="/assets/artifacts/artifact_registry.js" defer></script>
  <!-- artifact-type-scripts -->
  <script src="/assets/artifact-primitives/artifact_renderer.js" defer></script>
  <script src="/assets/artifacts/navigation/artifact_navigator.js" defer></script>
  <script src="/assets/artifact-primitives/interaction_overlay.js" defer></script>
  <script src="/assets/artifact-primitives/target_link.js" defer></script>
  <script src="/assets/artifact-primitives/interaction_overlay_controller.js" defer></script>
  <script src="/assets/artifact-toolbar.js" defer></script>
  <script src="/assets/artifact-binding.js" defer></script>
  <script src="/assets/artifact-workbench.js" defer></script>
